name: Build macOS App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build Release (ad-hoc signed)
        working-directory: CalendarApp
        run: |
          set -euo pipefail
          xcodebuild \
            -project CalendarApp.xcodeproj \
            -scheme CalendarApp \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build | xcbeautify --renderer github-actions || true

      - name: Verify app bundle
        working-directory: CalendarApp
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/CalendarApp.app"
          if [[ ! -d "$APP" ]]; then
              echo "::error::Build did not produce $APP"
              ls -R build/Build/Products/Release || true
              exit 1
          fi
          codesign -dvv "$APP" || true
          file "$APP/Contents/MacOS/CalendarApp"
          du -sh "$APP"

      - name: Zip app
        working-directory: CalendarApp
        run: |
          set -euo pipefail
          mkdir -p dist
          APP="build/Build/Products/Release/CalendarApp.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "dist/CalendarApp-macOS.zip"
          ls -la dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalendarApp-macOS
          path: CalendarApp/dist/CalendarApp-macOS.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CalendarApp/dist/CalendarApp-macOS.zip
          generate_release_notes: true
          body: |
            macOS build of Calendar Generator (universal arm64 + x86_64).

            **Install:** unzip, drag `CalendarApp.app` to `/Applications`.

            **First launch:** macOS Gatekeeper will warn — right-click the app → **Open** → **Open**.
            (The build is ad-hoc signed, not Developer ID notarized.)

            For wider distribution without warnings, build locally with a Developer ID certificate and notarize via `xcrun notarytool`. Hooks are in `CalendarApp/build_app.sh`.
